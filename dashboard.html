<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>无障碍比价数据平台</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <h1>比价平台</h1>
        <p class="sub">采集与结果页</p>
        <button id="refreshBtn" class="btn">刷新数据</button>
        <button id="clearBtn" class="btn danger">清空数据</button>

        <h2>页面跳转</h2>
        <div class="analysis-nav">
          <button class="nav-btn active" disabled>采集与结果</button>
          <a class="nav-link-btn" href="analysis.html">数据分析页</a>
        </div>

        <h2>任务批次</h2>
        <div id="runList" class="run-list"></div>

        <p class="project-link">
          项目地址：
          <a href="https://github.com/dreamking60/browser-machine" target="_blank" rel="noopener noreferrer">
            github.com/dreamking60/browser-machine
          </a>
        </p>
      </aside>

      <main class="main">
        <section class="panel" id="panelTask">
          <div class="title-row">
            <h2>任务配置</h2>
            <p id="status" class="status">状态：待启动</p>
          </div>

          <div class="form-grid">
            <label>关键词
              <input id="keyword" type="text" placeholder="例如：电动轮椅" />
            </label>
            <label>每个平台页数
              <input id="pages" type="number" min="1" value="2" />
            </label>
            <label>执行间隔（毫秒）
              <input id="intervalMs" type="number" min="1000" value="4000" />
            </label>
            <label class="check"><input id="speech" type="checkbox" />语音提示</label>
          </div>

          <div class="actions">
            <button id="startBtn" class="btn primary">启动采集</button>
            <button id="stopBtn" class="btn danger">停止全部</button>
          </div>

          <hr />
          <h3>定时任务（默认关闭）</h3>
          <div class="form-grid">
            <label class="check"><input id="scheduleEnabled" type="checkbox" /> 开启定时任务</label>
            <label>定时关键词
              <input id="scheduleKeyword" type="text" placeholder="例如：万历十五年" />
            </label>
            <label>每个平台页数
              <input id="schedulePages" type="number" min="1" value="2" />
            </label>
            <label>触发间隔（分钟）
              <input id="scheduleIntervalMinutes" type="number" min="1" value="60" />
            </label>
            <label>执行间隔（毫秒）
              <input id="scheduleIntervalMs" type="number" min="1000" value="4000" />
            </label>
            <label class="check"><input id="scheduleSpeech" type="checkbox" /> 定时任务语音提示</label>
          </div>
          <div class="actions">
            <button id="saveScheduleBtn" class="btn primary">保存定时配置</button>
            <button id="runScheduleNowBtn" class="btn">立即执行一次</button>
            <span id="scheduleStatus" class="status">定时状态：未开启</span>
          </div>
        </section>

        <section class="panel" id="panelExport">
          <h2>导出中心</h2>
          <div class="export-row">
            <label>CSV 编码
              <select id="csvEncoding">
                <option value="utf-8">UTF-8</option>
                <option value="gbk">GBK</option>
              </select>
            </label>
            <button id="exportCsvBtn" class="btn">导出 CSV</button>
            <button id="exportExcelBtn" class="btn">导出 Excel</button>
            <button id="exportJsonBtn" class="btn">导出 JSON</button>
          </div>
        </section>

        <section class="panel">
          <div class="title-row">
            <h2>结果明细</h2>
            <div id="tableHint" class="active-run">当前：全部任务</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>平台</th>
                  <th>标题</th>
                  <th>价格</th>
                  <th>销量</th>
                  <th>店铺</th>
                  <th>链接</th>
                  <th>时间</th>
                </tr>
              </thead>
              <tbody id="resultBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
