<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>无障碍比价数据平台</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <h1>比价平台</h1>
        <p class="sub">无障碍自动化采集面板</p>
        <button id="refreshBtn" class="btn">刷新数据</button>
        <button id="clearBtn" class="btn danger">清空数据</button>

        <h2>功能区</h2>
        <div class="quick-nav">
          <button class="nav-btn active" data-jump="panelTask">任务</button>
          <button class="nav-btn" data-jump="panelFilter">筛选</button>
          <button class="nav-btn" data-jump="panelAnalysis">分析</button>
          <button class="nav-btn" data-jump="panelExport">导出</button>
        </div>

        <h2>分析视图</h2>
        <div class="analysis-nav" id="analysisNav">
          <button class="nav-btn active" data-view="summary">汇总</button>
          <button class="nav-btn" data-view="taobao">淘宝</button>
          <button class="nav-btn" data-view="jd">京东</button>
          <button class="nav-btn" data-view="compare">对比</button>
        </div>

        <h2>任务批次</h2>
        <div id="runList" class="run-list"></div>
        <p class="project-link">
          项目地址：
          <a href="https://github.com/dreamking60/browser-machine" target="_blank" rel="noopener noreferrer">
            github.com/dreamking60/browser-machine
          </a>
        </p>
      </aside>

      <main class="main">
        <section class="panel" id="panelTask">
          <div class="title-row">
            <h2>任务配置</h2>
            <p id="status" class="status">状态：待启动</p>
          </div>

          <div class="form-grid">
            <label>关键词
              <input id="keyword" type="text" placeholder="例如：电动轮椅" />
            </label>
            <label>每个平台页数
              <input id="pages" type="number" min="1" value="2" />
            </label>
            <label>执行间隔（毫秒）
              <input id="intervalMs" type="number" min="1000" value="4000" />
            </label>
            <label class="check"><input id="speech" type="checkbox" />语音提示</label>
          </div>

          <div class="actions">
            <button id="startBtn" class="btn primary">启动采集</button>
            <button id="stopBtn" class="btn danger">停止全部</button>
          </div>
        </section>

        <section class="panel" id="panelFilter">
          <h2>筛选与看板</h2>
          <div class="form-grid">
            <label>平台筛选
              <select id="filterPlatform">
                <option value="all">全部</option>
                <option value="taobao">淘宝</option>
                <option value="jd">京东</option>
              </select>
            </label>
            <label>店铺关键词
              <input id="filterShop" type="text" placeholder="例如：新华书店" />
            </label>
            <label>标题关键词
              <input id="filterTitle" type="text" placeholder="例如：典藏版" />
            </label>
            <label>最小销量
              <input id="filterMinSales" type="number" min="0" placeholder="例如：1000" />
            </label>
            <label>最低价格
              <input id="filterMinPrice" type="number" min="0" step="0.01" placeholder="例如：20" />
            </label>
            <label>最高价格
              <input id="filterMaxPrice" type="number" min="0" step="0.01" placeholder="例如：200" />
            </label>
            <label>排序方式
              <select id="sortMode">
                <option value="price_asc">价格升序</option>
                <option value="price_desc">价格降序</option>
                <option value="sales_desc">销量降序</option>
                <option value="time_desc">时间倒序</option>
              </select>
            </label>
          </div>
          <div class="actions">
            <button id="applyFilterBtn" class="btn primary">应用筛选</button>
            <button id="resetFilterBtn" class="btn">重置筛选</button>
          </div>
          <div class="export-row">
            <label>保存视图名称
              <input id="viewName" type="text" placeholder="例如：低价高销量" />
            </label>
            <button id="saveViewBtn" class="btn">保存视图</button>
            <label>已保存视图
              <select id="savedViewSelect">
                <option value="">请选择</option>
              </select>
            </label>
            <button id="applyViewBtn" class="btn">应用视图</button>
            <button id="deleteViewBtn" class="btn danger">删除视图</button>
          </div>
        </section>

        <section class="panel" id="panelExport">
          <h2>导出中心</h2>
          <div class="export-row">
            <label>CSV 编码
              <select id="csvEncoding">
                <option value="utf-8">UTF-8</option>
                <option value="gbk">GBK</option>
              </select>
            </label>
            <button id="exportCsvBtn" class="btn">导出 CSV</button>
            <button id="exportExcelBtn" class="btn">导出 Excel</button>
            <button id="exportJsonBtn" class="btn">导出 JSON</button>
            <button id="exportReportBtn" class="btn primary">导出分析报告</button>
          </div>
        </section>

        <section class="panel" id="panelAnalysis">
          <div class="title-row">
            <h2>数据分析</h2>
            <div id="activeRunText" class="active-run">当前：全部任务</div>
          </div>
          <div class="stats" id="analysisStats"></div>
          <div class="charts" id="analysisCharts"></div>
        </section>

        <section class="panel">
          <div class="title-row">
            <h2>结果明细（单页）</h2>
            <div id="tableHint" class="active-run">已按价格升序</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>平台</th>
                  <th>标题</th>
                  <th>价格</th>
                  <th>销量</th>
                  <th>店铺（标准）</th>
                  <th>链接</th>
                  <th>时间</th>
                </tr>
              </thead>
              <tbody id="resultBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>显示设置</h2>
          <div class="checks-row">
            <label><input id="darkMode" type="checkbox" /> 深色模式</label>
            <label><input id="mergeSimilar" type="checkbox" checked /> 同款归并分析</label>
          </div>
        </section>
      </main>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
